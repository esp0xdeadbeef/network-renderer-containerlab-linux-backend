# fabric.clab.yml
name: fabric
topology:
  defaults:
    kind: linux
    image: clab-frr-plus-tooling:latest
    sysctls:
      net.ipv4.ip_forward: '1'
      net.ipv6.conf.all.forwarding: '1'
      net.ipv4.conf.all.rp_filter: '0'
      net.ipv4.conf.default.rp_filter: '0'
  nodes:
    esp0xdeadbeef-site-a-s-router-access:
      kind: linux
      image: clab-frr-plus-tooling:latest
      exec:
      - sh -c 'for i in /proc/sys/net/ipv4/conf/*/rp_filter; do echo 0 > "$i"; done'
      - ip link set eth1 up
      - ip addr replace 10.10.0.0/31 dev eth1
      - ip -6 addr replace fd42:dead:beef:1000::/127 dev eth1
      - ip route replace 10.10.0.0/31 dev eth1 scope link
      - ip -6 route replace fd42:dead:beef:1000::/127 dev eth1
      - ip route replace 10.10.0.0/31 via 10.10.0.1 dev eth1 onlink
      - ip route replace 10.10.0.2/31 via 10.10.0.1 dev eth1 onlink
      - ip route replace 10.10.0.2/31 via 10.10.0.1 dev eth1 onlink
      - ip route replace 10.10.0.4/31 via 10.10.0.1 dev eth1 onlink
      - ip route replace 10.10.0.4/31 via 10.10.0.1 dev eth1 onlink
      - ip -6 route replace fd42:dead:beef:1000::2/127 via fd42:dead:beef:1000:0:0:0:1
        dev eth1 onlink
      - ip -6 route replace fd42:dead:beef:1000::4/127 via fd42:dead:beef:1000:0:0:0:1
        dev eth1 onlink
      - ip route replace default via 10.10.0.1 dev eth1 onlink
    esp0xdeadbeef-site-a-s-router-policy:
      kind: linux
      image: clab-frr-plus-tooling:latest
      exec:
      - sh -c 'for i in /proc/sys/net/ipv4/conf/*/rp_filter; do echo 0 > "$i"; done'
      - ip link set eth1 up
      - ip link set eth2 up
      - ip addr replace 10.10.0.1/31 dev eth1
      - ip -6 addr replace fd42:dead:beef:1000::1/127 dev eth1
      - ip addr replace 10.10.0.4/31 dev eth2
      - ip -6 addr replace fd42:dead:beef:1000::4/127 dev eth2
      - ip route replace 10.10.0.0/31 dev eth1 scope link
      - ip -6 route replace fd42:dead:beef:1000::/127 dev eth1
      - ip route replace 10.10.0.4/31 dev eth2 scope link
      - ip -6 route replace fd42:dead:beef:1000::4/127 dev eth2
      - ip route replace 10.10.0.0/31 via 10.10.0.0 dev eth1 onlink
      - ip route replace 10.20.10.0/24 via 10.10.0.0 dev eth1 onlink
      - ip route replace 10.20.15.0/24 via 10.10.0.0 dev eth1 onlink
      - ip route replace 10.20.20.0/24 via 10.10.0.0 dev eth1 onlink
      - ip -6 route replace fd42:dead:beef:10::/64 via fd42:dead:beef:1000:0:0:0:0
        dev eth1 onlink
      - ip -6 route replace fd42:dead:beef:15::/64 via fd42:dead:beef:1000:0:0:0:0
        dev eth1 onlink
      - ip -6 route replace fd42:dead:beef:20::/64 via fd42:dead:beef:1000:0:0:0:0
        dev eth1 onlink
      - ip route replace 10.10.0.2/31 via 10.10.0.5 dev eth2 onlink
      - ip route replace 10.10.0.2/31 via 10.10.0.5 dev eth2 onlink
      - ip route replace 10.10.0.4/31 via 10.10.0.5 dev eth2 onlink
      - ip -6 route replace fd42:dead:beef:1000::2/127 via fd42:dead:beef:1000:0:0:0:5
        dev eth2 onlink
      - ip route replace default via 10.10.0.5 dev eth2 onlink
      - sysctl -w net.ipv4.ip_forward=1
      - sysctl -w net.ipv6.conf.all.forwarding=1
    esp0xdeadbeef-site-a-s-router-upstream-selector:
      kind: linux
      image: clab-frr-plus-tooling:latest
      exec:
      - sh -c 'for i in /proc/sys/net/ipv4/conf/*/rp_filter; do echo 0 > "$i"; done'
      - ip link set eth1 up
      - ip link set eth2 up
      - ip addr replace 10.10.0.3/31 dev eth1
      - ip -6 addr replace fd42:dead:beef:1000::3/127 dev eth1
      - ip addr replace 10.10.0.5/31 dev eth2
      - ip -6 addr replace fd42:dead:beef:1000::5/127 dev eth2
      - ip route replace 10.10.0.2/31 dev eth1 scope link
      - ip -6 route replace fd42:dead:beef:1000::2/127 dev eth1
      - ip route replace 10.10.0.4/31 dev eth2 scope link
      - ip -6 route replace fd42:dead:beef:1000::4/127 dev eth2
      - ip route replace 10.10.0.2/31 via 10.10.0.2 dev eth1 onlink
      - ip route replace 10.10.0.0/31 via 10.10.0.4 dev eth2 onlink
      - ip route replace 10.10.0.0/31 via 10.10.0.4 dev eth2 onlink
      - ip route replace 10.10.0.4/31 via 10.10.0.4 dev eth2 onlink
      - ip route replace 10.20.10.0/24 via 10.10.0.4 dev eth2 onlink
      - ip route replace 10.20.15.0/24 via 10.10.0.4 dev eth2 onlink
      - ip route replace 10.20.20.0/24 via 10.10.0.4 dev eth2 onlink
      - ip -6 route replace fd42:dead:beef:10::/64 via fd42:dead:beef:1000:0:0:0:4
        dev eth2 onlink
      - ip -6 route replace fd42:dead:beef:15::/64 via fd42:dead:beef:1000:0:0:0:4
        dev eth2 onlink
      - ip -6 route replace fd42:dead:beef:20::/64 via fd42:dead:beef:1000:0:0:0:4
        dev eth2 onlink
      - ip -6 route replace fd42:dead:beef:1000::/127 via fd42:dead:beef:1000:0:0:0:4
        dev eth2 onlink
      - ip route replace default via 10.10.0.2 dev eth1 onlink
      - sysctl -w net.ipv4.ip_forward=1
      - sysctl -w net.ipv6.conf.all.forwarding=1
    esp0xdeadbeef-site-a-s-router-core:
      kind: linux
      image: clab-frr-plus-tooling:latest
      exec:
      - sh -c 'for i in /proc/sys/net/ipv4/conf/*/rp_filter; do echo 0 > "$i"; done'
      - ip link set eth1 up
      - ip link set eth2 up
      - ip addr replace 10.10.0.2/31 dev eth1
      - ip -6 addr replace fd42:dead:beef:1000::2/127 dev eth1
      - ip addr replace 10.19.0.0/31 dev eth2
      - ip -6 addr replace fd42:dead:beef:1900::/127 dev eth2
      - ip -6 addr replace fe80::1/128 dev eth2
      - ip route replace 10.10.0.2/31 dev eth1 scope link
      - ip -6 route replace fd42:dead:beef:1000::2/127 dev eth1
      - ip route replace 10.19.0.0/31 dev eth2 scope link
      - ip -6 route replace fd42:dead:beef:1900::/127 dev eth2
      - ip route replace 10.10.0.0/31 via 10.10.0.3 dev eth1 onlink
      - ip route replace 10.10.0.0/31 via 10.10.0.3 dev eth1 onlink
      - ip route replace 10.10.0.2/31 via 10.10.0.3 dev eth1 onlink
      - ip route replace 10.10.0.4/31 via 10.10.0.3 dev eth1 onlink
      - ip route replace 10.10.0.4/31 via 10.10.0.3 dev eth1 onlink
      - ip route replace 10.20.10.0/24 via 10.10.0.3 dev eth1 onlink
      - ip route replace 10.20.15.0/24 via 10.10.0.3 dev eth1 onlink
      - ip route replace 10.20.20.0/24 via 10.10.0.3 dev eth1 onlink
      - ip -6 route replace fd42:dead:beef:10::/64 via fd42:dead:beef:1000:0:0:0:3
        dev eth1 onlink
      - ip -6 route replace fd42:dead:beef:15::/64 via fd42:dead:beef:1000:0:0:0:3
        dev eth1 onlink
      - ip -6 route replace fd42:dead:beef:20::/64 via fd42:dead:beef:1000:0:0:0:3
        dev eth1 onlink
      - ip -6 route replace fd42:dead:beef:1000::/127 via fd42:dead:beef:1000:0:0:0:3
        dev eth1 onlink
      - ip -6 route replace fd42:dead:beef:1000::4/127 via fd42:dead:beef:1000:0:0:0:3
        dev eth1 onlink
      - ip route replace default via 10.19.0.1 dev eth2 onlink
      - sysctl -w net.ipv4.ip_forward=1
      - sysctl -w net.ipv6.conf.all.forwarding=1
    esp0xdeadbeef-site-a-wan-peer-wan:
      kind: linux
      image: clab-frr-plus-tooling:latest
      exec:
      - sh -c 'for i in /proc/sys/net/ipv4/conf/*/rp_filter; do echo 0 > "$i"; done'
      - ip link set eth1 up
      - ip addr replace 10.19.0.1/31 dev eth1
      - ip -6 addr replace fd42:dead:beef:1900::1/127 dev eth1
      - ip route replace 10.10.0.0/31 via 10.19.0.0 dev eth1 onlink
      - ip route replace 10.10.0.2/31 via 10.19.0.0 dev eth1 onlink
      - ip route replace 10.10.0.0/31 via 10.19.0.0 dev eth1 onlink
      - ip route replace 10.10.0.4/31 via 10.19.0.0 dev eth1 onlink
      - ip route replace 10.10.0.2/31 via 10.19.0.0 dev eth1 onlink
      - ip route replace 10.10.0.4/31 via 10.19.0.0 dev eth1 onlink
      - ip -6 route replace fd42:dead:beef:1000::/127 via fd42:dead:beef:1900:0:0:0:0
        dev eth1 onlink
      - ip -6 route replace fd42:dead:beef:1000::2/127 via fd42:dead:beef:1900:0:0:0:0
        dev eth1 onlink
      - ip -6 route replace fd42:dead:beef:1000::/127 via fd42:dead:beef:1900:0:0:0:0
        dev eth1 onlink
      - ip -6 route replace fd42:dead:beef:1000::4/127 via fd42:dead:beef:1900:0:0:0:0
        dev eth1 onlink
      - ip -6 route replace fd42:dead:beef:1000::2/127 via fd42:dead:beef:1900:0:0:0:0
        dev eth1 onlink
      - ip -6 route replace fd42:dead:beef:1000::4/127 via fd42:dead:beef:1900:0:0:0:0
        dev eth1 onlink
      - sysctl -w net.ipv4.ip_forward=1
      - sysctl -w net.ipv6.conf.all.forwarding=1
      - nft flush ruleset
      - nft add table ip nat
      - nft 'add chain ip nat postrouting { type nat hook postrouting priority 100
        ; }'
      - nft add rule ip nat postrouting oifname "eth0" masquerade
      - ip route flush cache
      - ip -6 route flush cache
  links:
  - endpoints:
    - esp0xdeadbeef-site-a-s-router-access:eth1
    - esp0xdeadbeef-site-a-s-router-policy:eth1
    labels:
      clab.link.type: bridge
      clab.link.bridge: br-749a740b5ae3
  - endpoints:
    - esp0xdeadbeef-site-a-s-router-core:eth1
    - esp0xdeadbeef-site-a-s-router-upstream-selector:eth1
    labels:
      clab.link.type: bridge
      clab.link.bridge: br-c7141be66382
  - endpoints:
    - esp0xdeadbeef-site-a-s-router-policy:eth2
    - esp0xdeadbeef-site-a-s-router-upstream-selector:eth2
    labels:
      clab.link.type: bridge
      clab.link.bridge: br-26ec11ee8593
  - endpoints:
    - esp0xdeadbeef-site-a-s-router-core:eth2
    - esp0xdeadbeef-site-a-wan-peer-wan:eth1
    labels:
      clab.link.type: bridge
      clab.link.bridge: br-4f05e4cbc15f
