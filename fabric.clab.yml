      exec:
      - sh -c 'for i in /proc/sys/net/ipv4/conf/*/rp_filter; do echo 0 > "$i"; done'
      - ip link set tenant-admin up
      - ip addr replace 10.20.15.2/24 dev tenant-admin
      - ip -6 addr replace fd42:dead:beef:15::2/64 dev tenant-admin
      - mkdir -p /var/run/frr /etc/frr
      - touch /etc/frr/daemons /etc/frr/frr.conf /etc/frr/vtysh.conf
      - 'python3 -c "import json, pathlib

        payload = json.loads(\"{\"daemons\": {\"zebra\": \"yes\", \"bgpd\": \"yes\",
        \"ospfd\": \"no\", \"ospf6d\": \"no\", \"ripd\": \"no\", \"ripngd\": \"no\",
        \"isisd\": \"no\", \"pimd\": \"no\", \"pim6d\": \"no\", \"ldpd\": \"no\",
        \"nhrpd\": \"no\", \"eigrpd\": \"no\", \"babeld\": \"no\", \"sharpd\": \"no\",
        \"staticd\": \"yes\", \"bfdd\": \"no\", \"fabricd\": \"no\", \"vrrpd\": \"no\",
        \"pathd\": \"no\"}, \"frr_conf\": \"frr defaults traditional\nhostname client-s-router-access-admin-tenant-admin\nservice
        integrated-vtysh-config\nlog stdout\n!\nip forwarding\nipv6 forwarding\n!\nrouter
        bgp 1173735882\n bgp router-id 10.20.15.2\n no bgp ebgp-requires-policy\n
        no bgp network import-check\n address-family ipv4 unicast\n  network 10.20.15.0/24\n
        exit-address-family\n !\n address-family ipv6 unicast\n  network fd42:dead:beef:15::/64\n
        exit-address-family\n!\n address-family ipv4 unicast\n  network 10.20.15.0/24\n
        exit-address-family\n !\n address-family ipv6 unicast\n  network fd42:dead:beef:15::/64\n
        exit-address-family\n!\nline vty\n!\", \"vtysh_conf\": \"service integrated-vtysh-config\n\"}\")

        pathlib.Path(''/etc/frr'').mkdir(parents=True, exist_ok=True)

        daemon_lines = [f"{k}={v}" for k, v in payload[''daemons''].items()]

        pathlib.Path(''/etc/frr/daemons'').write_text(''\n''.join(daemon_lines) +
        ''\n'')

        pathlib.Path(''/etc/frr/frr.conf'').write_text(payload[''frr_conf''])

        pathlib.Path(''/etc/frr/vtysh.conf'').write_text(payload[''vtysh_conf''])

        "'
